<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Password Reset</title>
    <style>
        body { margin: 0; font-family: "Poppins", "Trebuchet MS", sans-serif; background: #f4efe6; color: #1d2935; }
        .wrap { max-width: 480px; margin: 10vh auto; background: #fffaf1; border: 1px solid #d7cbb8; border-radius: 12px; padding: 1.2rem; }
        input { width: 100%; padding: 0.55rem; margin: 0.7rem 0; border: 1px solid #d7cbb8; border-radius: 8px; }
        button { border: 0; background: #005f73; color: #fff; padding: 0.6rem 0.9rem; border-radius: 8px; cursor: pointer; }
        .err { color: #9b2226; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Reset your password</h1>
        {% if form.errors %}<p class="err">Enter a valid email address.</p>{% endif %}
        <form method="post">
            {% csrf_token %}
            {{ form.email }}
            <button type="submit">Send reset link</button>
        </form>
        <p><a href="{% url 'login' %}">Back to login</a></p>
    </div>
</body>
</html>
