<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <style>
        body { margin: 0; font-family: "Poppins", "Trebuchet MS", sans-serif; background: #f4efe6; color: #1d2935; }
        .wrap { max-width: 420px; margin: 8vh auto; background: #fffaf1; border: 1px solid #d7cbb8; border-radius: 12px; padding: 1rem; }
        label { display: block; margin-bottom: 0.3rem; font-size: 0.85rem; color: #5f6f7e; }
        input { width: 100%; padding: 0.55rem; margin-bottom: 0.8rem; border: 1px solid #d7cbb8; border-radius: 8px; }
        button { border: 0; background: #005f73; color: #fff; padding: 0.6rem 0.9rem; border-radius: 8px; cursor: pointer; }
        .err { color: #9b2226; margin-bottom: 0.7rem; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Login</h1>
        {% if form.non_field_errors %}
            {% for err in form.non_field_errors %}
                <p class="err">{{ err }}</p>
            {% endfor %}
        {% elif form.errors %}
            <p class="err">Invalid username or password.</p>
        {% endif %}
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <label for="id_username">Username</label>
            <input id="id_username" type="text" name="username" required>
            <label for="id_password">Password</label>
            <input id="id_password" type="password" name="password" required>
            {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
            <button type="submit">Sign In</button>
        </form>
        <p style="margin-top: 0.7rem;"><a href="{% url 'password_reset' %}">Forgot password?</a></p>
        <p style="margin-top: 0.9rem; color: #5f6f7e;">
            New user? <a href="{% url 'signup' %}">Create account</a>
        </p>
    </div>
</body>
</html>
