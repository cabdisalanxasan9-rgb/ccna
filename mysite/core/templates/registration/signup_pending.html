<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verify Email</title>
    <style>
        body { margin: 0; font-family: "Poppins", "Trebuchet MS", sans-serif; background: #f4efe6; color: #1d2935; }
        .wrap { max-width: 540px; margin: 10vh auto; background: #fffaf1; border: 1px solid #d7cbb8; border-radius: 12px; padding: 1.2rem; }
        a { color: #005f73; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Check your email</h1>
        <p>We sent an activation link to <strong>{{ email }}</strong>.</p>
        <p>Open the link to activate your account, then sign in.</p>
        <p><a href="{% url 'login' %}">Go to login</a></p>
    </div>
</body>
</html>
